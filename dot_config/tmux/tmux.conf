# Quinlan tmux config

# --- Prefix (Ctrl+Space — matches WezTerm leader) ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
# Secondary prefix for Ghostty Cmd keybinds (NUL byte \x00 is unreliable
# in terminal I/O, so Ghostty sends \x01 = Ctrl+A instead).
set -g prefix2 C-a

# --- Terminal ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -g escape-time 10
set -g focus-events on
set -g extended-keys always
set -g allow-passthrough on

# --- Mouse ---
set -g mouse on

# --- History ---
set -g history-limit 50000

# --- Indexing ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Window naming ---
# Prevent Claude Code from renaming tmux windows via OSC sequences.
# Instead, derive the visible title from the active pane path so Ghostty tabs
# mirror WezTerm's repo-aware naming: Quinlan worktrees by name, basename
# elsewhere.
set -g allow-rename off
set -g automatic-rename on
setw -g automatic-rename-format '#($HOME/.config/tmux/tab-title-from-path.sh #{q:pane_current_path})'
set -g set-titles on
set -g set-titles-string '#{?automatic-rename,#($HOME/.config/tmux/tab-title-from-path.sh #{q:pane_current_path}),#{?#{==:#{session_name},quinlan},main,#{s/^quinlan-//:session_name}}}'

# --- Pane splitting (WezTerm-style: h=right, v=down) ---
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

# --- Pane navigation (arrow keys — WezTerm-style) ---
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# --- Pane resizing (Shift+hjkl, repeatable) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Pane zoom (WezTerm-style) ---
bind z resize-pane -Z

# --- Close pane / window / session ---
bind x confirm-before -p "kill pane? (y/n)" kill-pane
bind X confirm-before -p "kill window? (y/n)" kill-window
bind Q kill-session

# --- Workspace / session picker (WezTerm-style) ---
bind w choose-tree -Zs

# --- New windows inherit cwd ---
bind c new-window -c "#{pane_current_path}"

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Bell notifications (Claude Code Stop hook sends \a) ---
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off

# --- Status bar ---
set -g status-position bottom
set -g status-style "bg=default,fg=#cdd6f4"
set -g status-left "#[fg=#89b4fa,bold] #{?automatic-rename,#($HOME/.config/tmux/tab-title-from-path.sh #{q:pane_current_path}),#{?#{==:#{session_name},quinlan},main,#{s/^quinlan-//:session_name}}} "
set -g status-left-length 30
set -g status-right "#[fg=#6c7086]%H:%M "
set -g status-right-length 20
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "
setw -g window-status-bell-style "fg=#f38ba8,bold"

# --- Pane borders ---
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
